# =============================================
# 1. IDENTITÉ DE L'APPLICATION
# =============================================
spring.application.name=all-in-store

# =============================================
# 2. CONFIGURATION BASE DE DONNÉES
# =============================================
# URL de connexion à PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/ALL-IN-STORE_UAT
spring.datasource.username=postgres
spring.datasource.password=kaloina1501
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexion HikariCP (intégré à Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# =============================================
# 3. CONFIGURATION JPA / HIBERNATE
# =============================================
# update : met à jour le schéma sans perdre les données (développement)
# validate : vérifie juste que le mapping est correct (production)
spring.jpa.hibernate.ddl-auto=update

# Affiche les requêtes SQL dans la console
spring.jpa.show-sql=true

# Formate les requêtes SQL pour une meilleure lisibilité
spring.jpa.properties.hibernate.format_sql=true

# Dialecte PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Évite le problème de LazyInitializationException
spring.jpa.open-in-view=false

# Optimisations des performances
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =============================================
# 4. CONFIGURATION THYMELEAF (temporaire)
# =============================================
# Désactive le cache pour le développement
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =============================================
# 5. CONFIGURATION SERVEUR
# =============================================
# Port d'écoute
server.port=8080

# Préfixe pour toutes les URLs de l'API
server.servlet.context-path=/api

# =============================================
# 6. CONFIGURATION JWT (pour la sécurité future)
# =============================================
# Clé secrète pour signer les tokens (À CHANGER en production !)
jwt.secret=VotreCleSecreteTresLonguePourJWT2024Minimum256Bits
# Durée de validité du token : 24 heures (en millisecondes)
jwt.expiration=86400000
# Durée de validité du refresh token : 7 jours (en millisecondes)
jwt.refresh-expiration=604800000

# =============================================
# 7. CONFIGURATION CORS (pour React)
# =============================================
# Origine autorisée (votre application React)
cors.allowed-origins=http://localhost:3000
# Méthodes HTTP autorisées
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
# Headers autorisés
cors.allowed-headers=Authorization,Content-Type,X-Requested-With
# Durée de mise en cache des règles CORS (1 heure)
cors.max-age=3600

# =============================================
# 8. CONFIGURATION LOGGING
# =============================================
# Niveau de log global
#logging.level.root=INFO

# Logs détaillés pour votre application
#logging.level.mg.working.allinstore=DEBUG

# Logs pour Spring Security
#logging.level.org.springframework.security=DEBUG

# Logs pour voir les requêtes SQL et leurs paramètres
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Format des logs dans la console
#logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Sauvegarde des logs dans un fichier
#logging.file.name=logs/all-in-store.log
#logging.file.max-size=10MB
#logging.file.max-history=30

# =============================================
# 9. CONFIGURATION DEVTOOLS (rechargement automatique)
# =============================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# =============================================
# 10. ACTUATOR (monitoring et santé)
# =============================================
# Endpoints exposés
management.endpoints.web.exposure.include=health,info,metrics
# URL de base pour les endpoints actuator
management.endpoints.web.base-path=/actuator
# Afficher les détails de santé (utile en développement)
management.endpoint.health.show-details=always