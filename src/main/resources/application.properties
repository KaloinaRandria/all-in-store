# =============================================
# 1. IDENTITÉ DE L'APPLICATION
# =============================================
spring.application.name=all-in-store

# =============================================
# 2. CONFIGURATION BASE DE DONNÉES
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/ALL-IN-STORE_UAT
spring.datasource.username=postgres
spring.datasource.password=kaloina1501
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexion HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# =============================================
# 3. CONFIGURATION JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =============================================
# 4. CONFIGURATION THYMELEAF (temporaire)
# =============================================
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =============================================
# 5. CONFIGURATION SERVEUR
# =============================================
server.port=8080
server.servlet.context-path=/api

# =============================================
# 6. CONFIGURATION JWT
# =============================================
# Clé en Base64 (obligatoire pour jwt) — générée à partir de votre clé originale
# À changer en production avec une vraie clé aléatoire 256 bits
jwt.secret=Vm90cmVDbGVTZWNyZXRlVHJlc0xvbmd1ZVBvdXJKV1QyMDI0TWluaW11bTI1NkJpdHMK
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# =============================================
# 7. CONFIGURATION CORS (géré dans SecurityConfig)
# =============================================
# Ces valeurs sont lues directement dans SecurityConfig.corsConfigurationSource()
cors.allowed-origins=http://localhost:3000,http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=Authorization,Content-Type,X-Requested-With
cors.max-age=3600

# =============================================
# 8. CONFIGURATION LOGGING
# =============================================
#logging.level.root=INFO
#logging.level.mg.working.allinstore=DEBUG
#logging.level.org.springframework.security=DEBUG
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
#logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
#logging.file.name=logs/all-in-store.log
#logging.file.max-size=10MB
#logging.file.max-history=30

# =============================================
# 9. DEVTOOLS
# =============================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# =============================================
# 10. ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always